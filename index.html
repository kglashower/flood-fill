<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f172a" />
    <title>Flood Fill</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="appRoot">
      <header class="hud" aria-label="Game HUD">
        <div class="hud__item"><span class="hud__label">Moves</span> <span id="movesValue">0</span></div>
        <div class="hud__item"><span class="hud__label">Best</span> <span id="bestValue">-</span></div>
        <div class="hud__controls">
          <span id="modeValue" class="mode-value">Classic • Rainbow</span>
          <button id="newGameBtn" class="btn btn--small" type="button">New Game</button>
        </div>
      </header>

      <main class="board-wrap" aria-label="Game board area">
        <section id="board" class="board" aria-label="Flood Fill board"></section>
      </main>

      <nav id="colorBar" class="color-bar" aria-label="Color controls"></nav>
    </div>

    <div id="winModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="winTitle">
      <div class="modal__content">
        <h2 id="winTitle">You Win!</h2>
        <p id="winMessage">Completed in 0 moves.</p>
        <button id="restartBtn" class="btn" type="button">Play Again</button>
      </div>
    </div>

    <div id="newGameModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="newGameTitle">
      <div class="modal__content modal__content--setup">
        <h2 id="newGameTitle">New Game</h2>
        <p class="setup-copy">Choose your challenge and color style.</p>

        <label for="setupDifficulty" class="setup-label">Difficulty</label>
        <select id="setupDifficulty" class="setup-select" aria-label="Select difficulty"></select>

        <label for="setupScheme" class="setup-label">Color Scheme</label>
        <select id="setupScheme" class="setup-select" aria-label="Select color scheme"></select>

        <div id="schemePreview" class="scheme-preview" aria-label="Color scheme preview"></div>

        <button id="startGameBtn" class="btn" type="button">Start Game</button>
      </div>
    </div>

    <div id="updateBanner" class="update-banner hidden" role="status" aria-live="polite">
      <span>Update available.</span>
      <button id="updateNowBtn" class="btn btn--small" type="button">Refresh</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
